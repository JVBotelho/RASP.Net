name: Build, Test & Security

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
    branches: [ develop, main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_NAME: 'Rasp.sln' 
  BUILD_CONFIG_REL: 'Release'
  BUILD_CONFIG_DBG: 'Debug'

permissions: read-all

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: true
    env:
      # secrets.* is not a valid context inside a step's `if:` (job or step level - GitHub
      # Actions rejects it at parse time with "Unrecognized named-value: 'secrets'", failing
      # the whole workflow, not just this step). env.* is a supported context there, so the
      # presence check is computed once here and referenced by name below.
      HAS_RASP_CORE_SNK: ${{ secrets.RASP_CORE_SNK_BASE64 != '' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        submodules: recursive

    - name: Setup .NET 10
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'ga'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props
          **/*.targets

    - name: Restore dependencies
      # --locked-mode fails the restore if packages.lock.json is out of sync with the actual
      # dependency graph, instead of silently regenerating it - without this flag, the
      # committed lock files are advisory only and drift goes unnoticed.
      run: dotnet restore ${{ env.SOLUTION_NAME }} --locked-mode

    # Public-signing (see src/Rasp.Core/Rasp.Core.csproj) only needs RaspCore.pub, already
    # committed, so this step is a no-op unless the secret below is configured - it exists
    # so a future release/publish job can opt into a *really* signed Rasp.Core.dll (whose
    # signature verifies, not just its public key token) without any other change here.
    # No release pipeline consumes this yet; wiring `/p:PublicSign=false` into an actual
    # signed build is deferred until one exists. See docs/ADR/006-sink-instrumentation-strategy.md
    # addendum point 5 for why a real private key was deliberately kept out of this pass.
    - name: Provision release signing key (if configured)
      if: env.HAS_RASP_CORE_SNK == 'true'
      shell: bash
      run: echo "${{ secrets.RASP_CORE_SNK_BASE64 }}" | base64 -d > src/Rasp.Core/RaspCore.snk

    - name: Build (Release)
      run: dotnet build ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_REL }} --no-restore

    - name: Run Tests
      run: dotnet test ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_REL }} --no-build --verbosity normal --logger "trx;LogFileName=test-results-${{ matrix.os }}.trx" --blame-hang-timeout 5m --collect:"XPlat Code Coverage" --results-directory ./coverage/${{ matrix.os }}

    - name: Upload Test Results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: '**/test-results-*.trx'

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/${{ matrix.os }}/**/coverage.cobertura.xml
        fail_ci_if_error: false

  pack-verify:
    name: Pack Verification
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        submodules: recursive

    - name: Setup .NET 10
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'ga'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props
          **/*.targets

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_NAME }} --locked-mode

    - name: Build (Release)
      run: dotnet build ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_REL }} --no-restore

    # Packs every packable project (the Phase A guards + the Rasp.Net meta-package per
    # docs/ADR/008-nuget-packaging.md) to catch packaging regressions in PRs - this does NOT
    # publish anywhere. The publish pipeline is docs/ADR/009-versioning-and-release-pipeline.md's
    # subject.
    - name: Pack (verification only, no publish)
      run: dotnet pack ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_REL }} --no-build --output ./artifacts/packages

    - name: Upload packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: nuget-packages
        path: |
          artifacts/packages/*.nupkg
          artifacts/packages/*.snupkg
        if-no-files-found: error

  security-audit:
    name: Security & Compliance
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        submodules: recursive

    - name: Setup .NET 10
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'ga'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION_NAME }} --locked-mode

    - name: NuGet Vulnerability Scan
      # No --framework pin: the solution mixes net10.0 projects with
      # Rasp.SourceGenerators (netstandard2.0, required for a Roslyn source generator),
      # and dotnet list fails outright if the pinned TFM doesn't exist in every project -
      # letting each project resolve against its own TFM(s) covers all of them instead.
      run: |
        dotnet list ${{ env.SOLUTION_NAME }} package --vulnerable --include-transitive > vulnerabilities.txt
        cat vulnerabilities.txt

        # Lógica melhorada para detetar Critical (case insensitive)
        if grep -i "Critical" vulnerabilities.txt; then
          echo "::error title=Security Audit::Critical vulnerabilities found in dependencies!"
          exit 1
        fi

        if grep -i "High" vulnerabilities.txt; then
          echo "::warning title=Security Audit::High vulnerabilities found. Consider updating."
        fi

        if grep -i "Moderate" vulnerabilities.txt; then
          echo "::warning title=Security Audit::Moderate vulnerabilities found. Consider updating."
        fi

    - name: Build for Generators
      run: dotnet build ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_DBG }} --no-restore

    - name: Verify Formatting
      run: dotnet format ${{ env.SOLUTION_NAME }} --verify-no-changes --verbosity diagnostic --exclude ./modules --no-restore

    - name: Initialize CodeQL
      uses: github/codeql-action/init@fb84f6228fd846d3c392887f22b18ce2d9139495 # v4
      with:
        languages: csharp

    - name: Build for CodeQL
      run: dotnet build ${{ env.SOLUTION_NAME }} --configuration ${{ env.BUILD_CONFIG_REL }} --no-restore /p:UseSharedCompilation=false

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@fb84f6228fd846d3c392887f22b18ce2d9139495 # v4

  native-profiler-build:
    name: Native Profiler Build (MSVC)
    runs-on: windows-latest
    # src/Rasp.Native.Profiler is not part of Rasp.sln; this job builds it with MSVC
    # (the primary toolchain per src/Rasp.Native.Profiler/README.md).
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        submodules: recursive

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

    # CodeQL for the native profiler: this repo's only SAST-covered C++, since
    # LoadLibraryW-driven chaining, IL rewriting, and raw metadata parsing live here.
    # build-mode: manual because the actual build happens via the CMake steps below, not an
    # autodetected build system.
    - name: Initialize CodeQL (cpp)
      uses: github/codeql-action/init@fb84f6228fd846d3c392887f22b18ce2d9139495 # v4
      with:
        languages: cpp
        build-mode: manual

    - name: Configure (CMake + Ninja, ASan/UBSan on)
      run: cmake -S src/Rasp.Native.Profiler -B src/Rasp.Native.Profiler/build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DRASP_ENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build src/Rasp.Native.Profiler/build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@fb84f6228fd846d3c392887f22b18ce2d9139495 # v4
      with:
        category: "/language:cpp"

    - name: Upload built DLL
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: Rasp.Native.Profiler-dll
        path: src/Rasp.Native.Profiler/build/*.dll
        if-no-files-found: error

    # Live-attach smoke test: builds a second, non-sanitized Release DLL (ASan changes the
    # DLL's ABI/memory layout and isn't representative of what would actually be loaded into
    # a real host process - see the RASP_ENABLE_SANITIZERS comment in CMakeLists.txt) and
    # runs the fixture documented in src/Rasp.Native.Profiler/README.md, asserting on its
    # exit code instead of requiring a human to re-run it and eyeball the output. This does
    # not replace re-running it by hand after a change to RaspProfiler.cpp/ILRewriter.cpp -
    # one process lifetime is too short to exercise re-JIT/tiered-compilation edge cases
    # (see README.md "Last verified") - but it does mean a rewrite that stops propagating
    # taint entirely no longer ships silently.
    - name: Configure & build profiler (Release, no sanitizers)
      run: |
        cmake -S src/Rasp.Native.Profiler -B src/Rasp.Native.Profiler/build-release -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build src/Rasp.Native.Profiler/build-release

    - name: Setup .NET 10 (for live-attach smoke test)
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'ga'

    - name: Build live-attach smoke test fixture
      # -p:Platform=AnyCPU overrides the `Platform=x64` environment variable left behind by
      # the earlier "Setup MSVC Developer Command Prompt" step (ilammy/msvc-dev-cmd sets it
      # for vcvarsall.bat) - an SDK-style csproj folds an inherited $(Platform) into the
      # output path (bin/x64/Debug/net10.0/ instead of bin/Debug/net10.0/), which is silent
      # and doesn't reproduce locally without that dev-prompt env active.
      run: dotnet build src/Rasp.Native.Profiler/SmokeTest/SmokeTest.csproj --configuration Debug -p:Platform=AnyCPU

    - name: Run live-attach smoke test
      shell: pwsh
      run: |
        $dll = Get-ChildItem -Path "src/Rasp.Native.Profiler/build-release" -Filter "*.dll" -Recurse | Select-Object -First 1
        if (-not $dll) { throw "No profiler DLL found under build-release/" }
        Write-Host "Profiler DLL: $($dll.FullName)"

        # Resolved via Get-ChildItem under bin/ (not a hardcoded bin/Debug/net10.0/ path):
        # even with -p:Platform=AnyCPU above, searching from bin/ rather than bin/Debug/
        # means a future platform/RID-subfolder quirk fails loudly with the message below
        # instead of silently ("The application to execute does not exist").
        $smokeTestDll = Get-ChildItem -Path "src/Rasp.Native.Profiler/SmokeTest/bin" -Filter "SmokeTest.dll" -Recurse | Select-Object -First 1
        if (-not $smokeTestDll) { throw "SmokeTest.dll not found under SmokeTest/bin/ - did the 'Build live-attach smoke test fixture' step succeed?" }
        Write-Host "SmokeTest fixture: $($smokeTestDll.FullName)"

        $env:CORECLR_ENABLE_PROFILING = "1"
        $env:CORECLR_PROFILER = "{9c80f47f-0a8f-4f39-8205-4c605c739df7}"
        $env:CORECLR_PROFILER_PATH = $dll.FullName
        $env:DOTNET_TieredCompilation = "0"

        dotnet exec $smokeTestDll.FullName
        if ($LASTEXITCODE -ne 0) {
          throw "Live-attach smoke test failed (exit code $LASTEXITCODE) - see src/Rasp.Native.Profiler/README.md"
        }
